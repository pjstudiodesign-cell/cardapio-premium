<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PJ STUDIO DESIGN</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000 url('pjstudio.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.85);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-area { text-align: center; margin-bottom: 20px; }
        .logo-area img { width: 80px; border-radius: 10px; }
        .business-name { color: #ffcc00; font-weight: bold; font-size: 1.4rem; text-transform: uppercase; margin-top: 5px; }

        .tabs { display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; width: 100%; max-width: 500px; padding-bottom: 5px; }
        .tab-btn {
            background: #2a2a2a;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .tab-btn.active { background: #ffcc00; color: #000; }

        .menu-section { display: none; width: 100%; max-width: 500px; }
        .menu-section.active { display: block; }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(5px);
        }
        .product-img { width: 75px; height: 75px; border-radius: 10px; object-fit: cover; background: #222; }
        .product-info { flex-grow: 1; }
        .product-info h3 { margin: 0; font-size: 1rem; color: #fff; }
        .product-info p { margin: 4px 0; font-size: 0.75rem; color: #aaa; line-height: 1.2; }
        .product-price { color: #00ff7f; font-weight: bold; font-size: 1.1rem; margin-top: 5px; }
        .add-btn { background: #00ff7f; border: none; width: 32px; height: 32px; border-radius: 8px; font-weight: bold; cursor: pointer; color: #000; font-size: 1.2rem; }

        .footer-area { width: 100%; max-width: 500px; margin-top: 20px; }
        .delivery-msg { color: #ffcc00; text-align: center; font-size: 0.8rem; margin-bottom: 10px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 8px; background: rgba(255, 255, 255, 0.05); border: 1px solid #444; border-radius: 8px; color: #fff; box-sizing: border-box; }
        .total-box { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; font-weight: bold; color: #fff; }
        .total-price { color: #00ff7f; font-size: 1.6rem; }
        .send-btn { width: 100%; background: #00ff7f; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="overlay">
    <div class="logo-area">
        <img src="pjstudio.jpg" alt="Logo">
        <div class="business-name">PJ STUDIO DESIGN</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'lanches')">🍔 Lanches</button>
        <button class="tab-btn" onclick="openTab(event, 'bebidas')">🥤 Bebidas</button>
        <button class="tab-btn" onclick="openTab(event, 'doces')">🍰 Doces</button>
        <button class="tab-btn" onclick="openTab(event, 'molhos')">🍯 Molhos</button>
    </div>

    <div id="lanches" class="menu-section active">
        <div class="product-card">
            <img src="foto1.jpg" class="product-img">
            <div class="product-info">
                <h3>Combo PJ Classic</h3>
                <p>Pão brioche, blend 180g, queijo cheddar, alface, tomate e maionese artesanal.</p>
                <div class="product-price">R$ 35,00</div>
            </div>
            <button class="add-btn" onclick="addToCart('Combo PJ Classic', 35.00)">+</button>
        </div>
        <div class="product-card">
            <img src="foto2.jpg" class="product-img">
            <div class="product-info">
                <h3>PJ Salad Premium</h3>
                <p>Blend bovino, muito queijo prato, picles de cebola roxa e molho especial.</p>
                <div class="product-price">R$ 38,00</div>
            </div>
            <button class="add-btn" onclick="addToCart('PJ Salad Premium', 38.00)">+</button>
        </div>
    </div>

    <div id="bebidas" class="menu-section">
        <div class="product-card">
            <img src="foto7.jpg" class="product-img">
            <div class="product-info">
                <h3>Coca-Cola Lata</h3>
                <p>350ml geladinha.</p>
                <div class="product-price">R$ 6,00</div>
            </div>
            <button class="add-btn" onclick="addToCart('Coca-Cola Lata', 6.00)">+</button>
        </div>
    </div>
