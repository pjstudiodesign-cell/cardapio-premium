<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PJ Studio Burger - Cardápio Digital</title>
    <style>
        /* RESET E ESTILO BASE (ESTILO APPLE DARK) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #000; color: #fff; padding-bottom: 80px; }

        /* CABEÇALHO */
        header { text-align: center; padding: 30px 20px; background: #000; border-bottom: 1px solid #1a1a1a; }
        header h1 { color: #00ff7f; font-size: 1.8rem; text-transform: uppercase; margin-bottom: 5px; }
        header p { color: #888; font-size: 0.9rem; }

        /* MENU DE NAVEGAÇÃO (FIXO NO TOPO) */
        nav { position: sticky; top: 0; z-index: 1000; background: #000; padding: 15px 0; border-bottom: 1px solid #00ff7f; display: flex; justify-content: center; gap: 10px; overflow-x: auto; }
        nav a { background: #1a1a1a; color: #fff; padding: 8px 18px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 0.8rem; border: 1px solid #333; white-space: nowrap; transition: 0.3s; }
        nav a:active { background: #00ff7f; color: #000; }

        /* CONTAINER PRINCIPAL */
        .container { max-width: 900px; margin: auto; padding: 20px; }
        
        /* TÍTULOS DE SEÇÃO */
        .category-title { display: flex; align-items: center; margin: 30px 0 20px; }
        .category-title div { width: 4px; height: 25px; background: #00ff7f; margin-right: 12px; border-radius: 2px; }
        .category-title h2 { font-size: 1.3rem; text-transform: uppercase; letter-spacing: 1px; color: #fff; }

        /* GRADE DE PRODUTOS (ADAPTÁVEL) */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        
        .product-card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; display: flex; flex-direction: column; }
        .product-card img { width: 100%; height: 120px; object-fit: cover; background: #222; }
        
        .product-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-info h3 { font-size: 0.95rem; margin-bottom: 5px; color: #fff; }
        .product-info p { font-size: 0.75rem; color: #777; margin-bottom: 12px; line-height: 1.2; }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; }
        .price-row .price { color: #00ff7f; font-weight: bold; font-size: 1rem; }
        
        /* BOTÃO ADICIONAR */
        .add-btn { background: #00ff7f; border: none; width: 32px; height: 32px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* BARRA DO CARRINHO (WHATSAPP) */
        #cart-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #00ff7f; color: #000; padding: 15px 25px; border-radius: 40px; display: none; justify-content: space-between; align-items: center; font-weight: bold; box-shadow: 0 8px 25px rgba(0, 255, 127, 0.4); z-index: 2000; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <h1>PJ STUDIO BURGER</h1>
        <p>Design moderno para o seu paladar</p>
    </header>

    <nav>
        <a href="#lanches">🍔 LANCHES</a>
        <a href="#adicionais">🍟 ADICIONAIS</a>
        <a href="#bebidas">🥤 BEBIDAS</a>
    </nav>

    <div class="container">
        
        <section id="lanches">
            <div class="category-title"><div></div><h2>
